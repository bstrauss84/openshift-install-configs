---
# NetworkAttachmentDefinition: OVN-Kubernetes secondary L2 network (no host bridge)
# Requires OVN-Kubernetes CNI (default in OCP 4.18+) and Multus.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovn-secondary-l2
  namespace: CHANGE-ME-namespace
  annotations:
    k8s.v1.cni.cncf.io/resourceName: ""
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "ovn-secondary-l2",
      "type": "ovn-k8s-cni-overlay",
      "topology":"layer2"
    }
# Notes:
# - Creates an isolated L2 overlay provided by OVN. Assign IP via kubevirt interfaces or guest OS.
# - Pair with an egress/ingress gateway (egress-router or external gateway) if external connectivity is required.
