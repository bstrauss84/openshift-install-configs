---
# VM example for Option 3: use the Linux bridge NAD (direct to 'br1')
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-br1-net
  namespace: vmtest
spec:
  running: true
  template:
    metadata:
      labels:
        example: br1-linux-bridge
    spec:
      networks:
        - name: br1-net
          multus:
            networkName: vmtest/br1-network
      domain:
        devices:
          interfaces:
            - name: br1-net
              bridge: {}
        resources:
          requests:
            memory: 2Gi
            cpu: 2
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/centos-stream:9-latest
