---
# NAD for Option 3 (Linux bridge). Connect directly to 'br1'.
# No IPAM; configure IP inside the VM if needed.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: br1-network
  namespace: vmtest
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "bridge",
    "name": "br1-network",
    "bridge": "br1"
  }'
