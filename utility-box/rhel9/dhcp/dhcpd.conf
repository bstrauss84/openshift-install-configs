# Example ISC dhcpd.conf
default-lease-time 600;
max-lease-time 7200;
authoritative;

option domain-name "example.local";
option domain-name-servers 192.168.111.2;
option routers 192.168.111.1;
option ntp-servers 192.168.111.2;

subnet 192.168.111.0 netmask 255.255.255.0 {
  range 192.168.111.100 192.168.111.150;
}

# Static leases by MAC for control plane
host cp-0 {
  hardware ethernet 52:54:00:aa:bb:00;
  fixed-address 192.168.111.10;
}
host cp-1 {
  hardware ethernet 52:54:00:aa:bb:01;
  fixed-address 192.168.111.11;
}
host cp-2 {
  hardware ethernet 52:54:00:aa:bb:02;
  fixed-address 192.168.111.12;
}
