# This example includes:
# - OpenShift platform channel (graph enabled)
# - Additional images: must-gather, ODF and CNV must-gather, common base images
# - Operators for virtualization, ODF, NMState, Local Storage, plus guest images pointers
# After mirroring:
#   v1: see oc-mirror-workspace/results-*/ for ICSP/IDMS/ITMS/CS/CC and apply in order documented.
#   v2: see working-dir/cluster-resources/ for IDMS/ITMS/CS/CC. Apply cluster-resources/* manifests on the cluster.
# To discover current default channels:
#   oc-mirror list operators --catalog=registry.redhat.io/redhat/redhat-operator-index:v4.18 --version=4.18
---
kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
mirror:
  platform:
    channels:
    - type: ocp
      name: stable-4.18
        # pin min/max for reproducibility if desired
        # minVersion: 4.18.z
        # maxVersion: 4.18.z
    graph: true

  additionalImages:
  - name: registry.redhat.io/openshift4/ose-must-gather:latest
  - name: registry.redhat.io/ubi9/ubi:latest
  - name: registry.redhat.io/rhel9/support-tools:latest
  - name: registry.redhat.io/odf4/odf-must-gather-rhel9:v4.18
  - name: registry.redhat.io/container-native-virtualization/cnv-must-gather-rhel9:v4.18
    # VM guest image examples (remove if not using CNV)
  - name: registry.redhat.io/rhel8/rhel-guest-image:latest
  - name: registry.redhat.io/rhel9/rhel-guest-image:latest

  operators:
  - catalog: registry.redhat.io/redhat/redhat-operator-index:v4.18
    packages:
        # Virtualization
    - name: kubevirt-hyperconverged
      channels:
      - name: stable
    - name: kubernetes-nmstate-operator
      channels:
      - name: stable
    - name: odf-operator
      channels:
      - name: stable-4.18
    - name: local-storage-operator
      channels:
      - name: stable
