# Feel free to modify to reflect the operators/images you are targeting
# To get the current list of operators and their default channels for this minor, run on an internet-facing host:
#   oc-mirror list operators --catalog=registry.redhat.io/redhat/redhat-operator-index:v4.18 --version=4.18
# oc-mirror v2 writes artifacts under working-dir/cluster-resources (IDMS/ITMS/CS/CC).
# oc-mirror v1 writes artifacts under results-<timestamp>/ (ICSP for older clusters, or IDMS/ITMS on newer minors) and CatalogSource manifests.
# See repo README for exact apply steps for v1 vs v2.

---
kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
# This file includes OpenShift platform, a broad operator set, and useful additional images.
# v1 command (point-to-point):
#   oc mirror --config ./golden-all.yaml docker://registry.example.local:5000
# v1 command (multi-hop archive to removable media):
#   oc mirror --config ./golden-all.yaml file://./mirror-archive
#   # Then carry archives to high side and run:
#   oc mirror --from file://./mirror-archive docker://registry.high.example.local:5000
# v2 command (point-to-point) with workspace caching:
#   oc mirror --config ./golden-all.yaml --workspace file://./workdir \
#     docker://registry.example.local:5000 --v2
# Re-runs:
# - v1: use the same output directory if you want differential behavior; otherwise start clean.
# - v2: reuse the SAME --workspace to benefit from caching and only pull deltas when you add packages.
# Storage notes: v2 uses extra space for on-disk cache and cluster-resources under the workspace.
# Guest image boot-source setup references:
#   https://access.redhat.com/articles/7085872
#   https://access.redhat.com/solutions/7066555
